name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # -> ghcr.io/caseythecoder90/grindtrack

jobs:
  # --- PR + push gates ---------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      # verify runs spotless:check too — formatting violations fail the build
      - run: mvn -B verify
        working-directory: gt2/backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gt2/frontend/package-lock.json
      - run: npm ci
        working-directory: gt2/frontend
      # build = tsc --noEmit (strict) + vite build
      - run: npm run build
        working-directory: gt2/frontend

  # --- Build the image and push to GHCR (main only) ----------------------------
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: gt2               # Dockerfile COPYs frontend/ and backend/ from here
          file: gt2/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # --- Pull the new image on the VPS and restart -------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      # Skip gracefully until the VPS secrets are configured, so merges to main
      # don't show a red X before the first deployment is set up.
      - name: Check deploy secrets
        id: check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "$VPS_HOST" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VPS secrets not set — skipping deploy."
          fi
      - name: Deploy to VPS over SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/grindtrack
            git fetch origin main
            git reset --hard origin/main       # pick up compose/config changes
            cd gt2
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T app \
                   wget -qO- http://localhost:8080/api/public/stats > /dev/null 2>&1; then
                echo "deploy healthy"
                exit 0
              fi
              sleep 5
            done
            echo "health check failed after 150s"
            docker compose -f docker-compose.prod.yml logs --tail 100 app
            exit 1