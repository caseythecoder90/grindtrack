# Production compose for the Hetzner VPS.
#
# Unlike docker-compose.yml (local dev, builds from source), this pulls the prebuilt
# image that CI pushes to GHCR — no Maven/Node build happens on the VPS. It runs
# grindtrack's own Postgres, and attaches ONLY the app to the shared nginx network so
# the existing personal-website nginx container can proxy track.caseyrquinn.com to it.
#
# Deploy:  docker compose -f docker-compose.prod.yml pull && up -d
services:
  app:
    image: ghcr.io/caseythecoder90/grindtrack:latest
    container_name: grindtrack-app
    env_file: .env
    environment:
      # DB lives in the grindtrack-db container on the private 'internal' network.
      SPRING_DATASOURCE_URL: jdbc:postgresql://grindtrack-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms64m"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/public/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal   # reach the db
      - web         # reachable by the shared nginx container

  db:
    image: postgres:16-alpine
    container_name: grindtrack-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal   # private to grindtrack — NOT on 'web', so other apps can't reach it

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  web:
    # The network the personal-website nginx container already lives on.
    # Confirm the real name on the VPS:  docker network ls | grep app-network
    external: true
    name: personal-website_app-network